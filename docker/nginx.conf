events {
    worker_connections 4096;
}

http {
    # ============================================
    # LOGGING - Shows which backend handles each request
    # ============================================
    log_format upstream_log '[$time_local] '
        'client=$remote_addr '
        'method=$request_method '
        'request="$request" '
        'status=$status '
        'upstream=$upstream_addr '
        'upstream_status=$upstream_status '
        'response_time=${request_time}s '
        'upstream_time=${upstream_response_time}s '
        'bytes=$body_bytes_sent';

    access_log /var/log/nginx/access.log upstream_log;
    error_log  /var/log/nginx/error.log warn;

    # Use Docker's internal DNS resolver so nginx doesn't crash
    # if backends aren't up yet. Re-resolves every 10s.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Rate limiting (DISABLED FOR PERFORMANCE TESTING - Re-enable in production)
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    # limit_req_zone $binary_remote_addr zone=search_limit:10m rate=1000r/s;
    
    # For production, uncomment above and add this to locations:
    # limit_req zone=search_limit burst=200 nodelay;

    # Caching
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # ============================================
    # Lua-free round-robin via split_clients
    # Maps request ID to one of the 3 backends
    # ============================================
    split_clients "$request_id" $selected_backend {
        33.3%  backend-1;
        33.3%  backend-2;
        *      backend-3;
    }

    server {
        listen 80;
        server_name localhost;
        client_max_body_size 50m;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ============================================
        # Search API - with detailed upstream logging
        # ============================================
        location /api/search {
            # Rate limiting disabled for performance testing
            # limit_req zone=search_limit burst=100 nodelay;

            # Dynamic resolution - won't crash if backend is down
            set $target http://${selected_backend}:4000;
            proxy_pass $target;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Cache successful responses
            proxy_cache api_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_bypass $http_cache_control;
            add_header X-Cache-Status $upstream_cache_status;

            # Header showing which backend handled this request
            add_header X-Upstream-Server $selected_backend always;
        }

        # ============================================
        # API endpoints - route to backend cluster
        # ============================================
        location /api/ {
            # Rate limiting disabled for performance testing
            # limit_req zone=api_limit burst=50 nodelay;

            set $target http://${selected_backend}:4000;
            proxy_pass $target;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 24 4k;

            # Header showing which backend handled this request
            add_header X-Upstream-Server $selected_backend always;
        }

        # ============================================
        # Solr admin UI (for debugging)
        # ============================================
        location /solr/ {
            proxy_pass http://10.145.245.107:8983/solr/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ============================================
        # Default - return info (no frontend in Docker)
        # ============================================
        location / {
            return 200 '{"status":"nginx is running","backends":["backend-1:4000","backend-2:4000","backend-3:4000"]}\n';
            add_header Content-Type application/json;
        }
    }
}
