services:
  # ==========================================
  # CACHING LAYER
  # ==========================================
  redis:
    image: redis:7
    container_name: shared_redis
    networks:
      - velocity-network
    ports:
      - "6379:6379"

  # ==========================================
  # BACKEND API NODES (Load Balanced)
  # ==========================================
  backend-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: velocity-backend-1
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - SOLR_URL=http://10.145.245.107:8983/solr
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=debug
    networks:
      - velocity-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/search?q=test"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Node 2 (API Server)
  backend-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: velocity-backend-2
    ports:
      - "4001:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - SOLR_URL=http://10.145.245.107:8983/solr
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=debug
    networks:
      - velocity-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/search?q=test"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Node 3 (API Server)
  backend-3:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: velocity-backend-3
    ports:
      - "4002:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - SOLR_URL=http://10.145.245.107:8983/solr
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=debug
    networks:
      - velocity-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/search?q=test"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # NGINX REVERSE PROXY / LOAD BALANCER
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: shared_nginx
    restart: unless-stopped
    networks:
      - velocity-network
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - backend-1
      - backend-2
      - backend-3

volumes:
  solr-1-data:
  solr-2-data:
  solr-3-data:
  redis-data:
  nginx-logs:

networks:
  velocity-network:
    driver: bridge
